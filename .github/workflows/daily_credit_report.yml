name: Daily Credit Intelligence Report

# GitHub's cron scheduler runs this repo's ticks ~3-3.5 hours LATE, so ticks
# are scheduled from 3:22 AM IST onwards. Whichever tick executes first before
# the 7:15 IST window simply sleeps until 7:15, then sends; later ticks see
# the report was already sent and no-op. Sundays are skipped.
on:
  schedule:
    - cron: '52 21 * * *'  # 03:22 IST nominal
    - cron: '37 22 * * *'  # 04:07 IST
    - cron: '22 23 * * *'  # 04:52 IST
    - cron: '7 0 * * *'    # 05:37 IST
    - cron: '52 0 * * *'   # 06:22 IST
    - cron: '37 1 * * *'   # 07:07 IST
    - cron: '22 2 * * *'   # 07:52 IST
    - cron: '7 3 * * *'    # 08:37 IST
  workflow_dispatch:
    inputs:
      weekly:
        description: 'Send weekly digest instead of daily report'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force:
        description: 'Send even if today''s report already went out'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: credit-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Decide whether to send
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE: ${{ inputs.force || 'true' }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          # A queued tick may have checked out a commit older than the marker
          # pushed by an earlier tick — always read the freshest last_sent.
          git fetch origin main --quiet && git checkout origin/main -- data/last_sent.json 2>/dev/null || true
          python3 - <<'PY'
          import os, json, datetime, subprocess

          event = os.environ.get("EVENT_NAME", "")
          force = os.environ.get("FORCE", "true").lower()
          schedule = os.environ.get("SCHEDULE", "")

          IST = datetime.timezone(datetime.timedelta(hours=5, minutes=30))
          now = datetime.datetime.now(IST)
          today = now.date().isoformat()

          def read_last_sent():
              try:
                  with open("data/last_sent.json", encoding="utf-8") as f:
                      return json.load(f).get("date", "")
              except Exception:
                  return ""

          last_sent = read_last_sent()

          if schedule == "30 10 * * 5":
              send, why = True, "Friday weekly digest cron"
          elif event == "workflow_dispatch" and force != "false":
              send, why = True, "manual trigger (force)"
          elif now.weekday() == 6:
              send, why = False, "Sunday — no daily report"
          elif last_sent == today:
              send, why = False, f"already sent today ({last_sent})"
          elif (now.hour, now.minute) < (7, 15):
              # Tick arrived before the delivery window — hold until 07:15 IST
              # (GitHub's scheduler is hours late some days and on time others,
              # so early ticks wait instead of being wasted).
              import time as _t
              target = now.replace(hour=7, minute=15, second=0, microsecond=0)
              wait = (target - now).total_seconds()
              print(f"holding {wait/60:.0f} min until 07:15 IST (now {now:%H:%M} IST)")
              _t.sleep(max(0, wait))
              subprocess.run(["git", "fetch", "origin", "main", "--quiet"], check=False)
              subprocess.run(["git", "checkout", "origin/main", "--", "data/last_sent.json"], check=False)
              if read_last_sent() == today:
                  send, why = False, "another run sent while holding"
              else:
                  send, why = True, "window reached after hold, not yet sent today"
          else:
              send, why = True, f"window open ({now:%H:%M} IST), not yet sent today"

          print(("SEND" if send else "SKIP") + f" — {why}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"send={'true' if send else 'false'}\n")
          PY

      - name: Set up Python 3.11
        if: steps.gate.outputs.send == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.send == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      - name: Send Daily Credit Intelligence Report
        if: steps.gate.outputs.send == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          WEEKLY_DIGEST: ${{ github.event.schedule == '30 10 * * 5' && 'true' || inputs.weekly || 'false' }}
        run: python scripts/send_credit_report.py
