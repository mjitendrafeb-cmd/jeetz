name: Daily Credit Intelligence Report

on:
  schedule:
    # 02:00 UTC = 7:30 AM IST, Mon-Sat (daily report)
    - cron: '0 2 * * 1-6'
    # 10:30 UTC = 4:00 PM IST, Friday (weekly digest)
    - cron: '30 10 * * 5'
  workflow_dispatch:
    inputs:
      weekly:
        description: 'Send weekly digest instead of daily report'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      - name: Send Daily Credit Intelligence Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          BREVO_USER: ${{ secrets.BREVO_USER }}
          BREVO_PASSWORD: ${{ secrets.BREVO_PASSWORD }}
          WEEKLY_DIGEST: ${{ github.event.schedule == '30 10 * * 5' && 'true' || inputs.weekly || 'false' }}
        run: python scripts/send_credit_report.py
