name: Daily Credit Intelligence Report

# GitHub's cron scheduler is unreliable (ticks are often skipped or hours
# late), so we fire MANY staggered ticks across the 7:20-9:00 AM IST window.
# The gate step below sends the report at most once per day — whichever tick
# actually fires first wins, and the rest no-op. Sundays are skipped.
on:
  schedule:
    - cron: '52 1 * * *'   # 07:22 IST
    - cron: '7 2 * * *'    # 07:37 IST
    - cron: '23 2 * * *'   # 07:53 IST
    - cron: '38 2 * * *'   # 08:08 IST
    - cron: '53 2 * * *'   # 08:23 IST
    - cron: '8 3 * * *'    # 08:38 IST
    - cron: '24 3 * * *'   # 08:54 IST
  workflow_dispatch:
    inputs:
      weekly:
        description: 'Send weekly digest instead of daily report'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      force:
        description: 'Send even if today''s report already went out'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']

concurrency:
  group: credit-report
  cancel-in-progress: false

jobs:
  send-report:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Decide whether to send
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          FORCE: ${{ inputs.force || 'true' }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PY'
          import os, json, datetime

          event = os.environ.get("EVENT_NAME", "")
          force = os.environ.get("FORCE", "true").lower()
          schedule = os.environ.get("SCHEDULE", "")

          IST = datetime.timezone(datetime.timedelta(hours=5, minutes=30))
          now = datetime.datetime.now(IST)
          today = now.date().isoformat()

          last_sent = ""
          try:
              with open("data/last_sent.json", encoding="utf-8") as f:
                  last_sent = json.load(f).get("date", "")
          except Exception:
              pass

          if schedule == "30 10 * * 5":
              send, why = True, "Friday weekly digest cron"
          elif event == "workflow_dispatch" and force != "false":
              send, why = True, "manual trigger (force)"
          elif now.weekday() == 6:
              send, why = False, "Sunday — no daily report"
          elif last_sent == today:
              send, why = False, f"already sent today ({last_sent})"
          elif (now.hour, now.minute) < (7, 15):
              send, why = False, f"before 07:15 IST window (now {now:%H:%M} IST)"
          else:
              send, why = True, f"window open ({now:%H:%M} IST), not yet sent today"

          print(("SEND" if send else "SKIP") + f" — {why}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"send={'true' if send else 'false'}\n")
          PY

      - name: Set up Python 3.11
        if: steps.gate.outputs.send == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.send == 'true'
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/requirements.txt ]; then pip install -r scripts/requirements.txt; fi

      - name: Send Daily Credit Intelligence Report
        if: steps.gate.outputs.send == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION: ${{ secrets.TELEGRAM_SESSION }}
          WEEKLY_DIGEST: ${{ github.event.schedule == '30 10 * * 5' && 'true' || inputs.weekly || 'false' }}
        run: python scripts/send_credit_report.py
