name: Keep Alive

on:
  schedule:
    # Run daily at 01:45 UTC = 7:15 AM IST, Mon-Sat
    # This commits a file so GitHub sees activity and runs the 02:00 UTC report
    - cron: '45 1 * * 1-6'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Ping repo to keep scheduled workflows active
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keep_alive.txt
          git add .github/keep_alive.txt
          git commit -m "chore: keep-alive $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
