name: Keep Alive

# Disabled — external cron (cron-job.org) now handles scheduling reliably.
# This workflow is kept as workflow_dispatch only for manual use.
on:
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - name: Ping repo to keep scheduled workflows active
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          echo "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > .github/keep_alive.txt
          git add .github/keep_alive.txt
          git commit -m "chore: keep-alive $(date -u +%Y-%m-%d)"
          git push origin HEAD:main
