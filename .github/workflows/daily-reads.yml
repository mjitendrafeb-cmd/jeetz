name: Daily Reads Pipeline

on:
  workflow_dispatch:  # manual trigger from GitHub UI ("Run workflow" button)
    inputs:
      reprocess:
        description: 'Reprocess ALL files (rebuild every note with the latest schema)'
        type: boolean
        default: false
      purge:
        description: 'PERMANENTLY delete report(s): type part of the report name (comma-separated for multiple)'
        type: string
        default: ''

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4.2.2
        with:
          ref: claude/knowledge-mgmt-daily-reads-cj7wbf
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            anthropic \
            pdfplumber \
            google-api-python-client \
            google-auth

      - name: Purge notes (if requested)
        if: github.event.inputs.purge != ''
        run: python purge_notes.py "${{ github.event.inputs.purge }}"

      - name: Download & process files from Google Drive
        if: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON != '' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GDRIVE_FOLDER_ID: 1DKkfBndGPDD-UWYWkIuYr8jdWb802BG0
          FORCE_REPROCESS: ${{ github.event.inputs.reprocess }}
        run: python gdrive_ingest.py

      - name: Regenerate HTML viewer
        run: python view_notes.py --no-open

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "Nothing new to commit — library already up to date."
          else
            git commit -m "Daily reads update $(date -u +%Y-%m-%d)"
            git push origin claude/knowledge-mgmt-daily-reads-cj7wbf
          fi
