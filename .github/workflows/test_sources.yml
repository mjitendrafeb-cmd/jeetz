name: Test News Sources

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4 anthropic

      - name: Run source test
        timeout-minutes: 15
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -u -c "
          import requests
          h={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'}
          for u in ['https://stooq.com/q/l/?s=10yiny.b&f=sd2t2ohlcv&e=csv',
                    'https://stooq.pl/q/l/?s=10yiny.b&f=sd2t2ohlcv&e=csv',
                    'https://stooq.com/q/l/?s=10yiny.b&i=d',
                    'https://fred.stlouisfed.org/graph/fredgraph.csv?id=IRLTLT01INM156N',
                    'https://tradingeconomics.com/india/government-bond-yield']:
              try:
                  r=requests.get(u, headers=h, timeout=25)
                  print('===', u, '->', r.status_code, 'len', len(r.text))
                  print(r.text[:400].replace(chr(10),' | ')[:400])
                  if 'fredgraph' in u and r.status_code==200:
                      print('TAIL:', r.text.strip().split(chr(10))[-3:])
              except Exception as e:
                  print('===', u, 'ERROR', e)
          "
