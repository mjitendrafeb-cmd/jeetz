name: Test News Sources

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser beautifulsoup4 anthropic

      - name: Run source test
        timeout-minutes: 15
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python -u -c "
          import requests
          h={'User-Agent':'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36'}
          syms='1yiny.b,2yiny.b,3yiny.b,5yiny.b,7yiny.b,10yiny.b'
          r=requests.get(f'https://stooq.com/q/l/?s={syms}&f=sd2t2ohlcv&h&e=csv', headers=h, timeout=30)
          print('stooq status', r.status_code); print(r.text[:1200])
          "
